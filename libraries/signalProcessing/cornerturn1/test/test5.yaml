integration_start: 11
sim_frames : 1
# Select the ripple filter to use, corresponds to the register setting
ripple : 0

polynomials:
  # each entry is for a particular virtual channel
  0:
    virtual_channel : 0
    # RFI threshold of 0 means any SPS RFI gets marked at the filterbank output
    # RFI threshold of 2^32-1 = 4294967295 means nothing is marked
    RFI_threshold : 0
    # polynomial coefficients c0 to c5, result = c0 + c1*t + ... + c5*t^5
    # Units of ns/s^k
     
    poly0 : [-355, 0, 0, 0, 0, 0]
    # sky frequency in GHz
    sky_freq0 : 0.20
    #seconds from the polynomial epoch to the start of the integration period, as a double precision value 
    buf_offset0 : 10
    # double precision offset in ns for the second polarisation (relative to the first polarisation). 
    Ypol_offset0 : 0
    # Validity time : 32 bit buf_integration: Integration period at which the polynomial becomes valid.
    integration0 : 10
    valid0 : 1
    #
    poly1: [-355, 0, 0, 0, 0, 0 ]
    # sky frequency in GHz
    sky_freq1: 0.20
    #seconds from the polynomial epoch to the start of the integration period, as a double precision value 
    buf_offset1: 10
    # double precision offset in ns for the second polarisation (relative to the first polarisation). 
    Ypol_offset1: 0
    # Validity time : 32 bit buf_integration: Integration period at which the polynomial becomes valid.
    integration1: 20
    valid1: 1
    
  1:
    virtual_channel : 1
    RFI_threshold : 4294967295
    poly0: [ -191, 0, 0, 0, 0, 0 ]
    # sky frequency in GHz
    sky_freq0: 0.20
    #seconds from the polynomial epoch to the start of the integration period, as a double precision value 
    buf_offset0: 10
    # double precision offset in ns for the second polarisation (relative to the first polarisation). 
    Ypol_offset0: 0
    # Validity time : 32 bit buf_integration: Integration period at which the polynomial becomes valid.
    integration0: 10
    valid0: 1
    #
    poly1: [ -191, 0, 0, 0, 0, 0 ]
    # sky frequency in GHz
    sky_freq1: 0.20
    #seconds from the polynomial epoch to the start of the integration period, as a double precision value 
    buf_offset1: 10
    # double precision offset in ns for the second polarisation (relative to the first polarisation). 
    Ypol_offset1: 0
    # Validity time : 32 bit buf_integration: Integration period at which the polynomial becomes valid.
    integration1: 20
    valid1: 1
